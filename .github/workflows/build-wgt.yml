name: Build TizenYouTube WGT

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version/tag name (e.g. v0.1.0)'
        required: false
      publish_release:
        description: 'Publish a GitHub Release'
        required: false
        default: false
        type: boolean

env:
  TIZEN_STUDIO_VER: 5.6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump_version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump patch version and create tag
        run: |
          CURRENT=$(grep '<widget' app/config.xml | grep -oP '(?<=version=")[^"]+')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          RELEASE_TAG="v${NEW_VERSION}"

          sed -i "s/version=\"${CURRENT}\"/version=\"${NEW_VERSION}\"/" app/config.xml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add app/config.xml
          git commit -m "chore: bump version to ${RELEASE_TAG} [skip ci]"
          git tag "${RELEASE_TAG}"
          git push origin HEAD
          git push origin "${RELEASE_TAG}"

  build:
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release variables
        id: rel
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/}"
            PUBLISH_RELEASE="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_version }}" ]]; then
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
            PUBLISH_RELEASE="${{ github.event.inputs.publish_release }}"
          else
            RELEASE_VERSION=""
            PUBLISH_RELEASE="false"
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y expect zip unzip

      - name: Download Tizen Studio CLI
        run: |
          curl -fL -o tizen-installer \
            "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          chmod +x tizen-installer

      - name: Install Tizen Studio CLI
        run: |
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          echo "${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin" >> $GITHUB_PATH

      - name: Configure certificate profile
        env:
          AUTHOR_P12_B64: ${{ secrets.TIZEN_AUTHOR_KEY_B64 }}
          AUTHOR_P12_PASSWORD: ${{ secrets.TIZEN_AUTHOR_KEY_PW }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/tizen-data/keystore/author"
          mkdir -p "${GITHUB_WORKSPACE}/tizen-data/profile"
          echo "$AUTHOR_P12_B64" | base64 -d > "${GITHUB_WORKSPACE}/tizen-data/keystore/author/author.p12"

          cp .github/assets/profiles.xml "${GITHUB_WORKSPACE}/tizen-data/profile/profiles.xml"
          sed -i "s|\$GITHUB_WORKSPACE|${GITHUB_WORKSPACE}|g" "${GITHUB_WORKSPACE}/tizen-data/profile/profiles.xml"
          sed -i "s|\$KEY_PW|${AUTHOR_P12_PASSWORD}|g" "${GITHUB_WORKSPACE}/tizen-data/profile/profiles.xml"

          tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-data/profile/profiles.xml"

      - name: Prepare app icon
        run: |
          if [ -f assets/icons/icon-512.png ]; then
            cp assets/icons/icon-512.png app/icon.png
            echo "Using assets/icons/icon-512.png"
          else
            echo 'iVBORw0KGgoAAAANSUhEUgAAAHEAAABxCAYAAADVEh4BAAAAOklEQVR42u3BAQ0AAADCoPdPbQ8HFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA4NcBNKQAAfI5N0wAAAAASUVORK5CYII=' | base64 -d > app/icon.png
            echo "No source icon found, generated placeholder app/icon.png"
          fi

      - name: Build web app
        working-directory: app
        run: tizen build-web -e ".gitignore" -e "README.md"

      - name: Package WGT
        working-directory: app
        run: |
          tizen package -t wgt -s TizenYouTube -- ./
          mkdir -p ../dist
          cp *.wgt ../dist/TizenYouTube.wgt

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: tizen-youtube-wgt
          path: dist/TizenYouTube.wgt

      - name: Publish GitHub Release
        if: steps.rel.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.release_version }}
          name: TizenYouTube ${{ steps.rel.outputs.release_version }}
          files: dist/TizenYouTube.wgt
          generate_release_notes: true
