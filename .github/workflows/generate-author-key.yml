name: Generate Tizen Author Key

on:
  workflow_dispatch:
    inputs:
      cert_password:
        description: 'Password for generated author.p12 (not printed to logs)'
        required: true
      common_name:
        description: 'Certificate common name'
        required: false
        default: 'TizenYouTube Author'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare password file (no stdout)
        run: |
          mkdir -p out
          python3 - <<'PY'
import json
import os
from pathlib import Path

with open(os.environ['GITHUB_EVENT_PATH'], 'r', encoding='utf-8') as f:
    event = json.load(f)
password = event.get('inputs', {}).get('cert_password', '')
if not password:
    raise SystemExit('cert_password input is empty')
Path('out/.cert_password').write_text(password, encoding='utf-8')
Path('out/TIZEN_AUTHOR_KEY_PW.txt').write_text(password, encoding='utf-8')
PY

      - name: Generate author certificate and PKCS#12
        run: |
          openssl genrsa -out out/author.key 2048
          openssl req -new -x509 -key out/author.key -out out/author.crt -days 3650 \
            -subj "/CN=${{ github.event.inputs.common_name }}"
          openssl pkcs12 -export \
            -inkey out/author.key \
            -in out/author.crt \
            -name "tizen-author" \
            -out out/author.p12 \
            -passout file:out/.cert_password

      - name: Create base64 for GitHub secret
        run: |
          base64 -w 0 out/author.p12 > out/TIZEN_AUTHOR_KEY_B64.txt
          rm -f out/.cert_password

      - name: Upload generated key artifact
        uses: actions/upload-artifact@v5
        with:
          name: tizen-author-key
          path: out/

      - name: Secret setup instructions
        run: |
          echo "1) Download artifact: tizen-author-key"
          echo "2) Set repository secret TIZEN_AUTHOR_KEY_B64 from out/TIZEN_AUTHOR_KEY_B64.txt"
          echo "3) Set repository secret TIZEN_AUTHOR_KEY_PW from out/TIZEN_AUTHOR_KEY_PW.txt"