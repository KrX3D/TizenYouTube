<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
  <title>TizenYouTube</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="status-banner" id="statusBanner">
    <!-- Left: service status dot -->
    <div class="svc-dot" id="svcDot" title="Service status">●</div>

    <!-- Center: app status info -->
    <div class="status-center">
      <span id="statusText">Initializing…</span>
      <span class="status-sep">&nbsp;•&nbsp;</span>
      <span id="versionText"></span>
      <span class="status-sep">&nbsp;•&nbsp;</span>
      <span id="networkText"></span>
      <span id="updateBadge" class="update-badge" style="display:none"></span>
    </div>

    <!-- Right: action buttons -->
    <div class="banner-actions">
      <button id="playlistBtn">≡ Playlist</button>
      <button id="gearBtn">⚙</button>
      <button id="debugBtn">🐛 Debug</button>
    </div>
  </header>

  <main class="launch-screen" id="launchScreen">
    <div class="launch-card">
      <h1>TizenYouTube</h1>
      <p id="launchStatus">Ready — press <strong>▶ Launch YouTube TV</strong> to start.</p>
      <button id="launchBtn" style="margin-top:24px">▶ Launch YouTube TV</button>
    </div>
  </main>

  <!-- ── Settings overlay ──────────────────────────────── -->
  <div id="settingsOverlay" class="overlay hidden">
    <div class="settings-panel">
      <h2>⚙ Settings</h2>
      <div id="settingsList" class="settings-list"></div>
      <p class="hint">↑↓ navigate · Enter/→ activate · ← cycle back · Back close</p>
    </div>
  </div>

  <!-- ── Playlist overlay ──────────────────────────────── -->
  <div id="playlistOverlay" class="overlay hidden">
    <div class="settings-panel">
      <h2>≡ Playlist lookup</h2>
      <p style="color:#8888aa;margin:0 0 16px;font-size:17px">API key set in ⚙ Settings.</p>
      <label style="font-size:19px;color:#b0b0d0">Playlist ID
        <div class="input-row" style="margin-top:8px">
          <input id="playlistId" type="email" placeholder="PL… — press Enter to edit" />
          <button id="fetchBtn">Fetch 5 items</button>
        </div>
      </label>
      <pre id="apiOutput" style="margin-top:14px">No request sent yet.</pre>
      <button id="playlistCloseBtn" style="margin-top:16px;background:#1e1e38;border-color:#3a3a5a">✗ Close</button>
    </div>
  </div>

  <!-- ── Debug console overlay ─────────────────────────── -->
  <div id="debugOverlay" class="overlay debug-overlay hidden">
    <div id="debugPanel" class="debug-panel">
      <div class="debug-header">
        <span>🐛 Debug Console</span>
        <span class="hint">↑↓ scroll · Yellow/Red/Green to close</span>
      </div>
      <div id="debugLogs" class="debug-logs"></div>
    </div>
  </div>

  <!-- ── Input dialog ──────────────────────────────────── -->
  <div id="inputDialog" class="overlay hidden">
    <div class="input-dialog-panel">
      <p id="inputDialogLabel" class="input-dialog-label"></p>
      <input id="inputDialogField" type="email" autocomplete="off" />
      <div class="input-dialog-btns">
        <button id="inputOk">✓ OK</button>
        <button id="inputCancel">✗ Cancel</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
  <script src="config.js"></script>
  <script src="logger.js"></script>
  <script src="keys.js"></script>
  <script src="runtimePatchContracts.js"></script>
  <script src="runtimePatchBridge.js"></script>
  <script src="update.js"></script>
  <script src="auth.js"></script>
  <script src="youtube.js"></script>
  <script src="main.js"></script>
</body>
</html>
