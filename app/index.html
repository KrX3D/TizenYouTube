<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
  <title>TizenYouTube</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Top status banner ─────────────────────────────── -->
  <header class="status-banner">
    <span id="statusText">Initializing…</span>
    <span id="versionText"></span>
    <span id="networkText"></span>
    <button id="gearBtn">⚙ Settings</button>
  </header>

  <!-- ── Main content ──────────────────────────────────── -->
  <main class="container">

    <!-- YouTube video player -->
    <section class="player-card">
      <h2>▶ Player</h2>
      <div id="playerContainer">
        <div class="player-placeholder">Enter a video ID or URL below to play</div>
      </div>
      <div class="player-controls">
        <input id="videoInput" type="text" readonly placeholder="Video ID or URL — press Enter to edit" />
        <button id="playBtn">▶ Play</button>
        <button id="stopBtn">■ Stop</button>
      </div>
    </section>

    <!-- YouTube API / playlist test -->
    <section class="card">
      <h2>Playlist lookup</h2>
      <p>API key set in <strong>⚙ Settings</strong>.</p>
      <label>Playlist ID
        <div class="input-row">
          <input id="playlistId" type="text" readonly placeholder="PL… — press Enter to edit" />
          <button id="fetchBtn">Fetch 5 items</button>
        </div>
      </label>
      <pre id="apiOutput">No request sent yet.</pre>
    </section>

  </main>

  <!-- ── Settings overlay ──────────────────────────────── -->
  <div id="settingsOverlay" class="overlay hidden">
    <div class="settings-panel">
      <h2>⚙ Settings</h2>
      <div id="settingsList" class="settings-list"></div>
      <p class="hint">↑↓ navigate · Enter toggle/edit · ← cycle back · Back close</p>
    </div>
  </div>

  <!-- ── Debug console overlay ─────────────────────────── -->
  <div id="debugOverlay" class="overlay debug-overlay hidden">
    <div id="debugPanel" class="debug-panel">
      <div class="debug-header">
        <span>🐛 Debug Console</span>
        <span class="hint">↑↓ scroll · Yellow to close</span>
      </div>
      <div id="debugLogs" class="debug-logs"></div>
    </div>
  </div>

  <!-- ── Input dialog ──────────────────────────────────── -->
  <div id="inputDialog" class="overlay hidden">
    <div class="input-dialog-panel">
      <p id="inputDialogLabel" class="input-dialog-label"></p>
      <input id="inputDialogField" type="text" />
      <div class="input-dialog-btns">
        <button id="inputOk">✓ OK</button>
        <button id="inputCancel">✗ Cancel</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
  <script src="config.js"></script>
  <script src="logger.js"></script>
  <script src="auth.js"></script>
  <script src="player.js"></script>
  <script src="main.js"></script>
</body>
</html>
